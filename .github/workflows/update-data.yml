name: Update catalog data

on:
  schedule:
    - cron: '0 3 * * *'  # codziennie 3:00 UTC (5:00 PL) — mniejszy ruch na fal.ai
  workflow_dispatch:      # ręczny trigger z UI GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup SSH (mikrus)
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Fetch fal.ai via mikrus
        run: |
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          SSH="ssh -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          SCP="scp -P ${{ secrets.DEPLOY_PORT }}"
          if $SCP scripts/fetch-fal.py ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/fetch-fal.py \
            && $SSH 'python3 /tmp/fetch-fal.py /tmp/fal-raw.json' \
            && $SCP ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/fal-raw.json data/fal-raw.json; then
            echo "FAL_PREFETCHED=1" >> $GITHUB_ENV
          else
            echo "⚠ fal.ai SSH fetch failed — update script will try directly (likely 429)"
          fi

      - name: Run update script
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
        run: bash scripts/update-litellm.sh

      - name: Commit updated data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update catalog data $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Cache-bust and deploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          V=$(date -u +%Y%m%d%H%M)
          sed -i "s|fetch('data/\([^']*\)')|fetch('data/\1?v=$V')|g" index.html
          echo "Cache-bust version: $V"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.pre-commit-config.yaml' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            -e "ssh -p ${{ secrets.DEPLOY_PORT }}" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}
